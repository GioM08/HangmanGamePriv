name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: dotnet tool install dotnet-sonarscanner --tool-path .sonar\scanner

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Begin SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          .sonar\scanner\dotnet-sonarscanner begin
          /k:"GioM08_HangmanGamePriv"
          /o:"giom08"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.exclusions="**/obj/**,**/bin/**,**/*.designer.cs,**/*.Designer.cs"

      - name: Create placeholder config files
        run: Copy-Item "Backend\HangmanGame\HangmanGameServices\EmailSettings.example.config" "Backend\HangmanGame\HangmanGameServices\EmailSettings.config"

      - name: Build Backend
        run: msbuild "Backend\HangmanGame\HangmanGame.slnx" /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Build UI
        run: msbuild "HangmanGameUI\HangmanGameUI.slnx" /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: .sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
